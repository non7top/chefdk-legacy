name: Build ChefDK Images

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/chefdk

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # required for cosign keyless signing

    strategy:
      matrix:
        include:
          - el: "6"
            dockerfile: Dockerfile.el6
            rpm: chefdk-1.6.1-1.el6.x86_64.rpm
          - el: "7"
            dockerfile: Dockerfile.el7
            rpm: chefdk-1.6.1-1.el7.x86_64.rpm

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          BASE="${{ env.IMAGE_BASE }}"
          EL="el${{ matrix.el }}"
          echo "tags=${BASE}:${EL},${BASE}:1.6.1-${EL}" >> "$GITHUB_OUTPUT"

      - name: Build (and push on merge)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}

      # cosign v2.x produces sha256-<digest>.sig tag consumed by Kyverno and
      # other tools that don't yet discover OCI 1.1 referrers.
      - name: Install cosign v2 (legacy .sig tag)
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v2.4.1

      - name: Sign image (legacy .sig tag)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            "${{ env.IMAGE_BASE }}@${{ steps.build.outputs.digest }}"

      # cosign v3.x stores via OCI 1.1 Referrers API for tools that support it.
      - name: Install cosign v3 (OCI referrers)
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image (OCI referrers)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            "${{ env.IMAGE_BASE }}@${{ steps.build.outputs.digest }}"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.rpm }}
          path: ${{ matrix.rpm }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Generate checksums
        run: |
          sha256sum chefdk-1.6.1-1.el6.x86_64.rpm \
                    chefdk-1.6.1-1.el7.x86_64.rpm \
            > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            chefdk-1.6.1-1.el6.x86_64.rpm
            chefdk-1.6.1-1.el7.x86_64.rpm
            SHA256SUMS
          generate_release_notes: true
