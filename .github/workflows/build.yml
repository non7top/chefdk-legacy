name: Build ChefDK Images

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/chefdk

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        include:
          - el: "6"
            dockerfile: Dockerfile.el6
            rpm: chefdk-1.6.1-1.el6.x86_64.rpm
          - el: "7"
            dockerfile: Dockerfile.el7
            rpm: chefdk-1.6.1-1.el7.x86_64.rpm

    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          BASE="${{ env.IMAGE_BASE }}"
          EL="el${{ matrix.el }}"
          SHA="${GITHUB_SHA::7}"
          REV="r${{ github.run_number }}"
          TAGS="${BASE}:${EL},${BASE}:1.6.1-${EL},${BASE}:${EL}-${SHA},${BASE}:1.6.1-${REV}-${EL}"
          if [ "${{ matrix.el }}" = "7" ]; then
            TAGS="${TAGS},${BASE}:latest,${BASE}:1.6.1-${REV}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build (and push on merge)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}

      # cosign v2.x produces sha256-<digest>.sig tag consumed by Kyverno and
      # other tools that don't yet discover OCI 1.1 referrers.
      - name: Install cosign v2 (legacy .sig tag)
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v2.4.1

      - name: Sign image (legacy .sig tag)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            "${{ env.IMAGE_BASE }}@${{ steps.build.outputs.digest }}"

      # cosign v3.x stores via OCI 1.1 Referrers API for tools that support it.
      - name: Install cosign v3 (OCI referrers)
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image (OCI referrers)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            "${{ env.IMAGE_BASE }}@${{ steps.build.outputs.digest }}"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Generate SHA256SUMS
        run: |
          sha256sum chefdk-1.6.1-1.el6.x86_64.rpm \
                    chefdk-1.6.1-1.el7.x86_64.rpm > SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign RPMs and SHA256SUMS
        run: |
          cosign sign-blob --yes chefdk-1.6.1-1.el6.x86_64.rpm \
            --bundle chefdk-1.6.1-1.el6.x86_64.rpm.cosign.bundle
          cosign sign-blob --yes chefdk-1.6.1-1.el7.x86_64.rpm \
            --bundle chefdk-1.6.1-1.el7.x86_64.rpm.cosign.bundle
          cosign sign-blob --yes SHA256SUMS \
            --bundle SHA256SUMS.cosign.bundle

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v1.6.1-r${{ github.run_number }}
          name: ChefDK 1.6.1-r${{ github.run_number }}
          files: |
            chefdk-1.6.1-1.el6.x86_64.rpm
            chefdk-1.6.1-1.el7.x86_64.rpm
            SHA256SUMS
            chefdk-1.6.1-1.el6.x86_64.rpm.cosign.bundle
            chefdk-1.6.1-1.el7.x86_64.rpm.cosign.bundle
            SHA256SUMS.cosign.bundle
          generate_release_notes: true
